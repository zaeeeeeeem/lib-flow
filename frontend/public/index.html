<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibraFlow — E-Library Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════════════ */
:root {
  --bg:          #0d0f14;
  --bg-2:        #131720;
  --bg-3:        #1a1f2e;
  --bg-card:     #1e2436;
  --bg-hover:    #252d42;
  --border:      #2a3148;
  --border-2:    #313b58;
  --text:        #e8eaf6;
  --text-2:      #9ba3c2;
  --text-3:      #5a6282;
  --accent:      #6c8ef5;
  --accent-2:    #a78bfa;
  --accent-glow: rgba(108,142,245,0.18);
  --green:       #34d399;
  --green-bg:    rgba(52,211,153,0.12);
  --amber:       #fbbf24;
  --amber-bg:    rgba(251,191,36,0.12);
  --red:         #f87171;
  --red-bg:      rgba(248,113,113,0.12);
  --cyan:        #22d3ee;
  --pink:        #f472b6;
  --radius:      12px;
  --radius-lg:   18px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:   0 8px 40px rgba(0,0,0,0.6);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;
  --sidebar-w:   260px;
  --transition:  0.2s cubic-bezier(0.4,0,0.2,1);
}

/* ── Reset ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
button { font-family: var(--font-body); cursor: pointer; border: none; }
input, select, textarea { font-family: var(--font-body); }
a { text-decoration: none; color: inherit; }
img { display: block; max-width: 100%; }

/* ═══════════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════════ */
.layout {
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}

.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 20px var(--accent-glow);
}
.logo-text { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
.logo-sub { font-size: 0.7rem; color: var(--text-3); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }

.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.nav-section-label {
  font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-3); padding: 8px 12px 6px; font-weight: 500;
}
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px; border-radius: 10px;
  color: var(--text-2); font-size: 0.9rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition); margin-bottom: 2px;
  position: relative;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active {
  background: var(--accent-glow);
  color: var(--accent);
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 25%; bottom: 25%;
  width: 3px; border-radius: 0 3px 3px 0;
  background: var(--accent);
}
.nav-icon { font-size: 1rem; width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto; background: var(--red-bg); color: var(--red);
  font-size: 0.7rem; font-weight: 600; padding: 1px 7px; border-radius: 20px;
}

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.sys-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sys-stat {
  background: var(--bg-3); border-radius: 8px; padding: 10px;
}
.sys-stat-val { font-size: 1.1rem; font-weight: 600; color: var(--text); }
.sys-stat-lbl { font-size: 0.65rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Main ────────────────────────────────────────────────── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-width: 0;
}

.topbar {
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; }
.topbar-actions { display: flex; align-items: center; gap: 12px; }

.content { padding: 32px; }

/* ═══════════════════════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════════════════════ */

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: 9px;
  font-size: 0.875rem; font-weight: 500;
  transition: all var(--transition);
}
.btn-primary {
  background: var(--accent); color: #fff;
  box-shadow: 0 0 16px rgba(108,142,245,0.3);
}
.btn-primary:hover { background: #5a7ef0; box-shadow: 0 0 24px rgba(108,142,245,0.5); }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border-2); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.btn-danger:hover { background: rgba(248,113,113,0.2); }
.btn-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.btn-success:hover { background: rgba(52,211,153,0.2); }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: 7px; }

/* ── Cards ───────────────────────────────────────────────── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
}
.card-sm { padding: 18px; border-radius: var(--radius); }

/* ── Stats Grid ──────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  position: relative;
  overflow: hidden;
  transition: border-color var(--transition);
}
.stat-card:hover { border-color: var(--border-2); }
.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--stat-accent, var(--accent));
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.stat-icon {
  width: 42px; height: 42px;
  background: var(--stat-bg, var(--accent-glow));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; margin-bottom: 14px;
}
.stat-val { font-size: 1.9rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 0.8rem; color: var(--text-3); font-weight: 500; }
.stat-sub { font-size: 0.75rem; color: var(--text-3); margin-top: 6px; }

/* ── Table ───────────────────────────────────────────────── */
.table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: var(--bg-3); }
th {
  text-align: left; padding: 13px 18px;
  font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-3); font-weight: 600; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  font-size: 0.875rem; vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr { transition: background var(--transition); }
tbody tr:hover { background: var(--bg-hover); }

/* ── Badges ──────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 600; letter-spacing: 0.3px;
}
.badge::before { content: '●'; font-size: 0.55rem; }
.badge-green  { background: var(--green-bg);  color: var(--green); }
.badge-red    { background: var(--red-bg);    color: var(--red);   }
.badge-amber  { background: var(--amber-bg);  color: var(--amber); }
.badge-blue   { background: rgba(108,142,245,0.12); color: var(--accent); }
.badge-purple { background: rgba(167,139,250,0.12); color: var(--accent-2); }

/* ── Forms ───────────────────────────────────────────────── */
.form-group { margin-bottom: 18px; }
.form-label {
  display: block; margin-bottom: 7px;
  font-size: 0.8rem; font-weight: 500; color: var(--text-2); letter-spacing: 0.3px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--bg-3);
  border: 1px solid var(--border); border-radius: 9px;
  color: var(--text); padding: 10px 14px; font-size: 0.875rem;
  transition: border-color var(--transition);
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.form-select { appearance: none; cursor: pointer; }
.form-textarea { resize: vertical; min-height: 90px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-error { font-size: 0.78rem; color: var(--red); margin-top: 5px; }

/* ── Search Bar ──────────────────────────────────────────── */
.search-bar {
  position: relative;
  display: flex; align-items: center;
}
.search-icon {
  position: absolute; left: 13px; color: var(--text-3); font-size: 1rem; pointer-events: none;
}
.search-bar input {
  background: var(--bg-3); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  padding: 10px 14px 10px 38px;
  font-size: 0.875rem; outline: none; width: 280px;
  transition: all var(--transition);
}
.search-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
  width: 340px;
}

/* ── Modal ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease;
}
.modal-header {
  padding: 22px 26px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-family: var(--font-display); font-size: 1.15rem; font-weight: 600; }
.modal-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--bg-3); border: 1px solid var(--border);
  color: var(--text-2); font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all var(--transition);
}
.modal-close:hover { background: var(--red-bg); color: var(--red); border-color: transparent; }
.modal-body { padding: 22px 26px; }
.modal-footer {
  padding: 16px 26px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
}
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes slideUp { from { transform: translateY(20px); opacity:0 } to { transform: translateY(0); opacity:1 } }

/* ── Book Cover ──────────────────────────────────────────── */
.book-cover {
  width: 42px; height: 54px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; flex-shrink: 0;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.4);
  position: relative; overflow: hidden;
}
.book-cover::after {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: rgba(0,0,0,0.25);
}

/* ── Member Avatar ───────────────────────────────────────── */
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 700; flex-shrink: 0;
  color: #fff;
}

/* ── Page Header ─────────────────────────────────────────── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.page-title { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; }
.page-sub { font-size: 0.85rem; color: var(--text-3); margin-top: 3px; }
.page-actions { display: flex; align-items: center; gap: 10px; }

/* ── Two-col grid ────────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

/* ── Tabs ────────────────────────────────────────────────── */
.tabs {
  display: flex; gap: 4px; background: var(--bg-3);
  padding: 4px; border-radius: 10px; width: fit-content;
}
.tab {
  padding: 7px 16px; border-radius: 7px;
  font-size: 0.85rem; font-weight: 500; color: var(--text-2);
  cursor: pointer; transition: all var(--transition);
}
.tab.active { background: var(--bg-card); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

/* ── Toast ───────────────────────────────────────────────── */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--bg-card); border: 1px solid var(--border-2);
  border-radius: 11px; padding: 12px 18px;
  box-shadow: var(--shadow); min-width: 280px;
  display: flex; align-items: center; gap: 10px;
  font-size: 0.875rem; font-weight: 500;
  animation: slideInRight 0.25s ease;
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--accent); }
@keyframes slideInRight { from { transform: translateX(100%); opacity:0 } to { transform: translateX(0); opacity:1 } }

/* ── Empty State ─────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 24px;
  color: var(--text-3);
}
.empty-icon { font-size: 3rem; margin-bottom: 14px; opacity: 0.5; }
.empty-title { font-size: 1rem; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.empty-sub { font-size: 0.85rem; }

/* ── Loading ─────────────────────────────────────────────── */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; color: var(--text-3); gap: 12px;
}
.spinner {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border-2);
  border-top-color: var(--accent);
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg) } }

/* ── Fine display ────────────────────────────────────────── */
.fine-amount {
  font-family: var(--font-mono); font-size: 0.85rem;
  color: var(--red); font-weight: 500;
}

/* ── Dashboard Charts ────────────────────────────────────── */
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 0.78rem; color: var(--text-2); width: 90px; flex-shrink: 0; }
.bar-track { flex: 1; background: var(--bg-3); border-radius: 4px; height: 8px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
.bar-count { font-size: 0.75rem; color: var(--text-3); width: 24px; text-align: right; flex-shrink: 0; }

/* ── Activity list ───────────────────────────────────────── */
.activity-list { display: flex; flex-direction: column; gap: 10px; }
.activity-item {
  display: flex; align-items: center; gap: 13px;
  padding: 12px 16px; background: var(--bg-3);
  border-radius: 10px; border: 1px solid var(--border);
}
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.activity-body { flex: 1; min-width: 0; }
.activity-title { font-size: 0.875rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.activity-sub { font-size: 0.78rem; color: var(--text-3); margin-top: 2px; }
.activity-time { font-size: 0.72rem; color: var(--text-3); white-space: nowrap; }

/* ── Color picker ────────────────────────────────────────── */
.color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all var(--transition);
}
.color-swatch.selected { border-color: #fff; transform: scale(1.15); }

/* ── Overdue Banner ──────────────────────────────────────── */
.overdue-banner {
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.25);
  border-radius: var(--radius); padding: 14px 18px;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.overdue-banner-icon { font-size: 1.3rem; }
.overdue-banner-text { font-size: 0.875rem; color: var(--red); font-weight: 500; }

/* ── API status ──────────────────────────────────────────── */
.api-status {
  display: flex; align-items: center; gap: 7px;
  font-size: 0.75rem; color: var(--text-3);
}
.api-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-3); }
.api-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
.api-dot.offline { background: var(--red); }

/* ── Info pill ───────────────────────────────────────────── */
.info-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.78rem; color: var(--text-3); font-family: var(--font-mono);
}

/* ═══════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════ */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.mt-1 { margin-top: 4px; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.fw-600 { font-weight: 600; }
.text-sm { font-size: 0.82rem; }
.text-xs { font-size: 0.75rem; }
.text-muted { color: var(--text-3); }
.text-2 { color: var(--text-2); }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mono { font-family: var(--font-mono); }
.w-full { width: 100%; }
</style>
</head>
<body>

<div class="layout" id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">📚</div>
        <div>
          <div class="logo-text">LibraFlow</div>
          <div class="logo-sub">Library System</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
        <span class="nav-icon">🏠</span> Dashboard
      </div>
      <div class="nav-item" onclick="navigate('books')" id="nav-books">
        <span class="nav-icon">📖</span> Books
      </div>
      <div class="nav-item" onclick="navigate('members')" id="nav-members">
        <span class="nav-icon">👥</span> Members
      </div>

      <div class="nav-section-label" style="margin-top:12px">Circulation</div>
      <div class="nav-item" onclick="navigate('loans')" id="nav-loans">
        <span class="nav-icon">🔄</span> Loans
      </div>
      <div class="nav-item" onclick="navigate('overdue')" id="nav-overdue">
        <span class="nav-icon">⚠️</span> Overdue
        <span class="nav-badge" id="overdue-badge" style="display:none"></span>
      </div>

      <div class="nav-section-label" style="margin-top:12px">Reference</div>
      <div class="nav-item" onclick="navigate('authors')" id="nav-authors">
        <span class="nav-icon">✍️</span> Authors
      </div>

// ── Avatar color from name ────────────────────────────────
function avatarColor(name) {
  const colors = ['#6366f1','#8b5cf6','#ec4899','#10b981','#06b6d4','#f59e0b','#f43f5e','#3b82f6'];
  let hash = 0;
  for (const c of name) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffffff;
  return colors[Math.abs(hash) % colors.length];
}
function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

// Unified fetch (live or mock)
async function fetchData(endpoint, query='') {
  if (useMock) {
    const key = endpoint.replace('/','');
    if (key === 'dashboard') return MOCK.dashboard;
    if (key === 'books') return MOCK.books.filter(b => !query || b.title.toLowerCase().includes(query.toLowerCase()));
    if (key === 'members') return MOCK.members;
    if (key.startsWith('loans')) {
      const params = new URLSearchParams(query);
      const st = params.get('status') || '';
      if (st === 'overdue') return MOCK.loans.filter(l=>l.days_overdue>0);
      if (st === 'active')  return MOCK.loans.filter(l=>!l.returned_at);
      return MOCK.loans;
    }
    if (key === 'categories') return MOCK.categories;
    if (key === 'authors')    return MOCK.authors;
    return [];
  }
  return api('/' + endpoint + (query ? '?' + query : ''));
}

function selectColor(color) {
  document.querySelectorAll('.color-swatch').forEach(el => {
    el.classList.toggle('selected', el.dataset.color === color);
  });
}

async function saveBook(id = null) {
  const title = document.getElementById('b-title').value.trim();
  if (!title) { toast('Title is required', 'error'); return; }
  const selected = document.querySelector('.color-swatch.selected');

  const payload = {
    title,
    isbn: document.getElementById('b-isbn').value.trim() || null,
    category_id: document.getElementById('b-cat').value || null,
    published_year: document.getElementById('b-year').value || null,
    total_copies: parseInt(document.getElementById('b-copies').value) || 1,
    description: document.getElementById('b-desc').value.trim() || null,
    cover_color: selected ? selected.dataset.color : '#6366f1',
  };

  if (useMock) {
    if (id) {
      const idx = MOCK.books.findIndex(b=>b.id===id);
      if (idx>=0) Object.assign(MOCK.books[idx], payload);
      toast('Book updated (demo mode)', 'success');
    } else {
      MOCK.books.push({id: Date.now(), ...payload, authors:'', available_copies: payload.total_copies});
      toast('Book added (demo mode)', 'success');
    }
    closeModal(); renderBooks(); return;
  }

  try {
    if (id) {
      await api(`/books/${id}`, { method:'PUT', body: payload });
      toast('Book updated successfully', 'success');
    } else {
      await api('/books', { method:'POST', body: payload });
      toast('Book added successfully', 'success');
    }
    closeModal(); renderBooks();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteBook(id, title) {
  if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
  if (useMock) {
    MOCK.books = MOCK.books.filter(b=>b.id!==id);
    toast('Book deleted (demo mode)', 'success');
    renderBooks(); return;
  }
  try {
    await api(`/books/${id}`, { method:'DELETE' });
    toast('Book deleted', 'success');
    renderBooks();
  } catch (e) { toast(e.message, 'error'); }
}

async function saveMember(id = null) {
  const name  = document.getElementById('m-name').value.trim();
  const email = document.getElementById('m-email').value.trim();
  if (!name || !email) { toast('Name and email are required', 'error'); return; }

  const payload = {

    phone:   document.getElementById('m-phone').value.trim() || null,
    address: document.getElementById('m-address').value.trim() || null,
    status:  document.getElementById('m-status').value,
  };

  if (useMock) {
    if (id) {
      const idx = MOCK.members.findIndex(m=>m.id===id);
      if (idx>=0) Object.assign(MOCK.members[idx], payload);
      toast('Member updated (demo mode)', 'success');
    } else {
      MOCK.members.push({id: Date.now(), ...payload, active_loans:0, joined_at: new Date().toISOString()});
      toast('Member added (demo mode)', 'success');
    }
    closeModal(); renderMembers(); return;
  }

  try {
    if (id) {
      await api(`/members/${id}`, { method:'PUT', body: payload });
      toast('Member updated', 'success');
    } else {
      await api('/members', { method:'POST', body: payload });
      toast('Member added', 'success');
    }
    closeModal(); renderMembers();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteMember(id, name) {
  if (!confirm(`Delete member "${name}"?`)) return;
  if (useMock) {
    const m = MOCK.members.find(m=>m.id===id);
    if (m?.active_loans > 0) { toast('Cannot delete member with active loans', 'error'); return; }
    MOCK.members = MOCK.members.filter(m=>m.id!==id);
    toast('Member deleted (demo mode)', 'success');
    renderMembers(); return;
  }
  try {
    await api(`/members/${id}`, { method:'DELETE' });
    toast('Member deleted', 'success');
    renderMembers();

}

async function returnLoan(id) {
  if (!confirm('Mark this book as returned?')) return;
  if (useMock) {
    const loan = MOCK.loans.find(l=>l.id===id);
    if (loan) { loan.returned_at = new Date().toISOString(); }
    toast(`Book returned${loan?.computed_fine>0?' — Fine: ₨ '+loan.computed_fine:''}`, 'success');
    renderLoans(loanTab); return;
  }
  try {
    const res = await api(`/loans/${id}/return`, { method:'PUT' });
    toast(`Book returned${res.fine_amount>0?' — Fine: ₨ '+res.fine_amount:''}`, 'success');
    renderLoans(loanTab);
  } catch (e) { toast(e.message, 'error'); }
}

async function openIssueLoanModal() {
  const [books, members] = await Promise.all([
    fetchData('books'),
    fetchData('members', 'status=active')
  ]);
  const available = books.filter(b => b.available_copies > 0);
  const twoWeeks = new Date(); twoWeeks.setDate(twoWeeks.getDate() + 14);
  const dueDefault = twoWeeks.toISOString().split('T')[0];

  showModal('Issue Book', `
    <div class="form-group">
      <label class="form-label">Book *</label>
      <select class="form-select" id="l-book">
        <option value="">— Select book —</option>
        ${available.map(b=>`<option value="${b.id}">${b.title} (${b.available_copies} available)</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Member *</label>
      <select class="form-select" id="l-member">
        <option value="">— Select member —</option>
        ${members.map(m=>`<option value="${m.id}">${m.name} — ${m.email}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Due Date *</label>
      <input class="form-input" id="l-due" type="date" value="${dueDefault}" min="${new Date().toISOString().split('T')[0]}">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="l-notes" placeholder="Optional notes…" style="min-height:70px"></textarea>
    </div>
  `, [
    { label: 'Issue Book', cls: 'btn-primary', action: saveIssueLoan },
    { label: 'Cancel', cls: 'btn-ghost', action: closeModal }
  ]);
}

async function saveIssueLoan() {
  const book_id   = document.getElementById('l-book').value;
  const member_id = document.getElementById('l-member').value;
  const due_date  = document.getElementById('l-due').value;
  if (!book_id || !member_id || !due_date) { toast('All fields are required', 'error'); return; }

  if (useMock) {
    const book = MOCK.books.find(b=>b.id==book_id);
    const member = MOCK.members.find(m=>m.id==member_id);
    if (book) book.available_copies--;
    MOCK.loans.unshift({
      id: Date.now(), book_title: book?.title, cover_color: book?.cover_color,
      member_name: member?.name, member_email: member?.email,
      issued_at: new Date().toISOString(), due_date, returned_at: null,
      computed_fine: 0, days_overdue: 0, fine_paid: 0
    });
    toast('Book issued successfully (demo mode)', 'success');
    closeModal(); navigate('loans'); return;
  }

  try {
    await api('/loans', { method:'POST', body: { book_id: parseInt(book_id), member_id: parseInt(member_id), due_date, notes: document.getElementById('l-notes').value || null }});
    toast('Book issued successfully', 'success');
    closeModal(); navigate('loans');
  } catch (e) { toast(e.message, 'error'); }
}

  showModal('Add Category', `
    <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="cat-name" placeholder="Category name"></div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="cat-desc" placeholder="What kind of books?"></textarea></div>
    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-picker" id="cat-colors">
        ${COLORS.map((c,i)=>`<div class="color-swatch ${i===0?'selected':''}" style="background:${c}" onclick="selectColor('${c}')" data-color="${c}"></div>`).join('')}
      </div>
    </div>
  `, [
    { label: 'Add Category', cls: 'btn-primary', action: saveCategory },
    { label: 'Cancel', cls: 'btn-ghost', action: closeModal }
  ]);
}

async function saveCategory() {
  const name = document.getElementById('cat-name').value.trim();
  if (!name) { toast('Name is required','error'); return; }
  const sel = document.querySelector('.color-swatch.selected');
  const payload = { name, description: document.getElementById('cat-desc').value.trim()||null, color: sel?.dataset.color || '#6366f1' };
  if (useMock) {
    MOCK.categories.push({id: Date.now(), ...payload});
    toast('Category added (demo mode)','success');
    closeModal(); renderCategories(); return;
  }
  try {
    await api('/categories', { method:'POST', body: payload });
    toast('Category added','success');
    closeModal(); renderCategories();
  } catch(e) { toast(e.message,'error'); }
}

// ═══════════════════════════════════════════════════════════
// MODAL SYSTEM
// ═══════════════════════════════════════════════════════════
function showModal(title, body, actions = []) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = actions.map((a,i) =>
    `<button class="btn ${a.cls}" onclick="window.__modalActions[${i}]()">${a.label}</button>`
  ).join('');
  window.__modalActions = actions.map(a => a.action);
  document.getElementById('modal-overlay').style.display = 'flex';
  setTimeout(() => document.querySelector('.form-input')?.focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
function toast(msg, type = 'info') {
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3500);
}

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════
function formatDate(str) {
  if (!str) return '—';
  try {
    return new Date(str).toLocaleDateString('en-PK', { day:'numeric', month:'short', year:'numeric' });
  } catch { return str.slice(0,10); }
}

// BOOT
// ═══════════════════════════════════════════════════════════
window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

(async () => {
  await checkHealth();
  navigate('dashboard');
})();
</script>
